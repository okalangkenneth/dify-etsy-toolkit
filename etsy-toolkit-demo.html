<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etsy Seller Toolkit</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e5e5e5; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
  h1 { font-size: 28px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #aaa; margin-bottom: 8px; }
  textarea { width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 12px; color: #e5e5e5; font-size: 14px; resize: vertical; min-height: 100px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: #555; }
  .hint { font-size: 12px; color: #555; margin-top: 6px; }
  button { width: 100%; background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
  button:hover:not(:disabled) { background: #6d28d9; }
  button:disabled { background: #3a2060; color: #888; cursor: not-allowed; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #888; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .section { margin-bottom: 16px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .section-label { font-size: 13px; font-weight: 500; color: #aaa; }
  .badge { font-size: 11px; background: #2a2a2a; color: #888; padding: 2px 8px; border-radius: 20px; }
  .copy-btn { font-size: 11px; background: none; border: none; color: #666; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; width: auto; margin: 0; }
  .copy-btn:hover { background: #2a2a2a; color: #aaa; }
  .copy-btn.copied { color: #4ade80; }
  .title-text { font-size: 15px; color: #e5e5e5; line-height: 1.5; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag { font-size: 12px; background: #2a2a2a; color: #aaa; padding: 4px 10px; border-radius: 6px; }
  .tag.invalid { background: #3a1a1a; color: #f87171; }
  .tag-len { opacity: 0.4; margin-left: 4px; font-size: 10px; }
  .desc-text { font-size: 14px; color: #ccc; line-height: 1.7; white-space: pre-wrap; }
  .valid-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
  .valid-badge.pass { background: #0f2a1a; color: #4ade80; border: 1px solid #166534; }
  .valid-badge.fail { background: #2a0f0f; color: #f87171; border: 1px solid #991b1b; }
  .error-box { background: #2a0f0f; border: 1px solid #991b1b; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 13px; color: #f87171; }
  #output { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🛍️ Etsy Seller Toolkit</h1>
  <p class="subtitle">Generate an SEO-optimized title, 13 tags, and a product description — ready to paste into Etsy.</p>

  <div class="card">
    <label>Describe your product idea</label>
    <textarea id="input" placeholder='e.g. "A printable weekly planner for busy moms who want to stay organized"'></textarea>
    <p class="hint">Tip: be specific — include who it is for and what problem it solves.</p>
    <button id="btn" onclick="generate()">Generate Etsy Listing</button>
  </div>

  <div id="error-box" class="error-box" style="display:none"></div>

  <div id="output">
    <div class="card section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-label">Title</span>
          <span class="badge" id="title-words"></span>
        </div>
        <button class="copy-btn" onclick="copyText('title-text','copy-title')" id="copy-title">Copy</button>
      </div>
      <div class="title-text" id="title-text"></div>
    </div>

    <div class="card section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-label">Tags</span>
          <span class="badge" id="tags-count"></span>
        </div>
        <button class="copy-btn" onclick="copyText('tags-copy','copy-tags')" id="copy-tags">Copy</button>
      </div>
      <div class="tags-wrap" id="tags-wrap"></div>
      <div id="tags-copy" style="display:none"></div>
    </div>

    <div class="card section">
      <div class="section-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="section-label">Description</span>
          <span class="badge" id="desc-words"></span>
        </div>
        <button class="copy-btn" onclick="copyText('desc-text','copy-desc')" id="copy-desc">Copy</button>
      </div>
      <div class="desc-text" id="desc-text"></div>
    </div>

    <div style="display:flex;align-items:center;gap:10px;padding:0 4px">
      <span class="section-label">Validation</span>
      <span class="valid-badge" id="valid-badge"></span>
      <span style="font-size:12px;color:#666" id="valid-msg"></span>
    </div>
  </div>
</div>

<script>
async function generate() {
  const idea = document.getElementById('input').value.trim()
  if (!idea) return

  const btn = document.getElementById('btn')
  const errBox = document.getElementById('error-box')
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>Generating...'
  errBox.style.display = 'none'
  document.getElementById('output').style.display = 'none'

  try {
    const csrf = document.cookie.split('; ')
      .find(r => r.startsWith('csrf_token='))?.split('=')[1] ?? ''

    const res = await fetch('/console/api/etsy-toolkit/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': csrf },
      credentials: 'include',
      body: JSON.stringify({ product_idea: idea })
    })

    if (!res.ok) {
      const d = await res.json().catch(() => ({}))
      throw new Error(d.message || `Error ${res.status}`)
    }

    const data = await res.json()
    renderOutput(data)
  } catch (e) {
    errBox.textContent = e.message || 'Something went wrong. Please try again.'
    errBox.style.display = 'block'
  } finally {
    btn.disabled = false
    btn.textContent = 'Generate Etsy Listing'
  }
}

function renderOutput(data) {
  const { title, tags, description, is_valid, validation_summary } = data

  document.getElementById('title-text').textContent = title
  document.getElementById('title-words').textContent = `${title.split(' ').length} words`

  const wrap = document.getElementById('tags-wrap')
  wrap.innerHTML = ''
  tags.forEach(tag => {
    const span = document.createElement('span')
    span.className = 'tag' + (tag.length > 20 ? ' invalid' : '')
    span.innerHTML = tag + `<span class="tag-len">${tag.length}</span>`
    wrap.appendChild(span)
  })
  document.getElementById('tags-count').textContent = `${tags.length}/13`
  document.getElementById('tags-copy').textContent = tags.join(', ')

  document.getElementById('desc-text').textContent = description
  document.getElementById('desc-words').textContent = `${description.split(' ').length} words`

  const badge = document.getElementById('valid-badge')
  badge.textContent = is_valid ? '✓ All checks passed' : '⚠ Validation warnings'
  badge.className = 'valid-badge ' + (is_valid ? 'pass' : 'fail')
  document.getElementById('valid-msg').textContent = validation_summary || ''

  document.getElementById('output').style.display = 'block'
}

function copyText(sourceId, btnId) {
  const text = document.getElementById(sourceId).textContent
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId)
    btn.textContent = '✓ Copied'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied') }, 2000)
  })
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate()
})
</script>
</body>
</html>
